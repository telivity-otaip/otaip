name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests and capture count
        id: tests
        run: |
          OUTPUT=$(pnpm test 2>&1 || true)
          CLEAN=$(echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g')
          TEST_COUNT=$(echo "$CLEAN" | sed -n 's/.*Tests  *\([0-9][0-9]*\) passed.*/\1/p' | tail -1)
          TEST_FILES=$(echo "$CLEAN" | sed -n 's/.*Test Files  *\([0-9][0-9]*\) passed.*/\1/p' | tail -1)
          echo "count=${TEST_COUNT:-0}" >> "$GITHUB_OUTPUT"
          echo "files=${TEST_FILES:-0}" >> "$GITHUB_OUTPUT"

      - name: Count agents
        id: agents
        run: |
          AGENT_COUNT=$(find packages/agents packages/adapters packages/core/src/agents -name 'index.ts' -path '*/src/*' ! -name '__tests__' | wc -l | tr -d ' ')
          echo "count=${AGENT_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_TOKEN" "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" | grep -q "200"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build release notes
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          AGENT_COUNT="${{ steps.agents.outputs.count }}"
          TEST_COUNT="${{ steps.tests.outputs.count }}"
          TEST_FILES="${{ steps.tests.outputs.files }}"

          # Collect commits since last tag, grouped by conventional-commit type
          FEATS=$(git log "${TAG}..HEAD" --pretty=format:"- %s" --grep="^feat" 2>/dev/null || true)
          FIXES=$(git log "${TAG}..HEAD" --pretty=format:"- %s" --grep="^fix" 2>/dev/null || true)
          DOCS=$(git log "${TAG}..HEAD" --pretty=format:"- %s" --grep="^docs" 2>/dev/null || true)
          CI=$(git log "${TAG}..HEAD" --pretty=format:"- %s" --grep="^ci" 2>/dev/null || true)
          OTHER=$(git log "${TAG}..HEAD" --pretty=format:"- %s" --invert-grep --grep="^feat" --grep="^fix" --grep="^docs" --grep="^ci" 2>/dev/null || true)

          {
            echo "${AGENT_COUNT} agents. ${TEST_COUNT} tests passing across ${TEST_FILES} files."
            echo ""

            if [ -n "$FEATS" ]; then
              echo "### Features"
              echo "$FEATS"
              echo ""
            fi

            if [ -n "$FIXES" ]; then
              echo "### Fixes"
              echo "$FIXES"
              echo ""
            fi

            if [ -n "$DOCS" ]; then
              echo "### Docs"
              echo "$DOCS"
              echo ""
            fi

            if [ -n "$CI" ]; then
              echo "### CI / Infra"
              echo "$CI"
              echo ""
            fi

            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "---"
            echo "Apache 2.0 · Full travel transaction lifecycle"
          } > /tmp/release-notes.md

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release-notes.md \
            --latest
