name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Download reference data
        run: pnpm run data:download

      - name: Test
        run: pnpm run test
ches: [main]
  pull_request:
      branches: [main]

      jobs:
        ci:
            runs-on: ubuntu-latest
                steps:
                      - uses: actions/checkout@v4

                            - uses: pnpm/
